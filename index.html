<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不偏配色（Unbiased Coloring）- ポートフォリオ用</title>
<style>
  /* Google Fontsから美しいセリフ体を取得 */
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    /* アートギャラリーの壁のような、わずかに温かみのあるオフホワイト */
    background: #FAFAFA;
    color: #1A1A1A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    /* ベースフォント（明朝体スタック） */
    font-family: 'Yu Mincho', 'Hiragino Mincho ProN', 'Shippori Mincho', serif;
  }

  /* 全体のレイアウトコンテナ（2カラム） */
  .container {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 72px; /* 左右の余白をたっぷりとる */
    max-width: 1200px;
    width: 100%;
  }

  /* 左：アートワーク（キャンバス） */
  .artwork {
    flex: 0 0 auto;
    background: #ffffff;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.04); /* 作品に立体感を持たせる微かな影 */
  }
  canvas { display: block; }

  /* 右：キャプション・説明文 */
  .caption {
    flex: 1;
    max-width: 420px; /* テキストが長くなりすぎないように制限 */
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  h1.title {
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    margin-bottom: 24px;
    border-bottom: 1px solid #E0E0E0;
    padding-bottom: 16px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  h1.title span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    color: #888;
    letter-spacing: 0.05em;
  }

  .formula {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: #333;
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }
  .formula i { font-style: italic; }
  .formula .label {
    font-size: 0.9rem;
    font-style: normal;
    color: #888;
    margin-right: 8px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  p.desc {
    font-size: 0.95rem;
    line-height: 2.0; /* 行間を広めにとって読みやすく洗練された印象に */
    color: #444;
    text-align: justify;
    margin-bottom: 40px; /* ボタンとの距離を離す */
  }

  /* ボタンデザイン */
  button {
    align-self: flex-start; /* 左寄せ */
    padding: 12px 32px;
    font-family: 'Yu Mincho', 'Hiragino Mincho ProN', serif;
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    background: #111111;
    color: #ffffff;
    border: 1px solid #111111;
    border-radius: 2px;
    transition: all 0.2s ease;
  }
  button:hover  { background: #ffffff; color: #111111; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* スマホ等、画面が小さい場合は縦並びに変更 */
  @media (max-width: 1000px) {
    .container {
      flex-direction: column;
      gap: 40px;
    }
    .artwork canvas {
      width: 100%;
      height: auto;
    }
    .caption { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="artwork">
    <canvas id="c"></canvas>
  </div>

  <div class="caption">
    <h1 class="title">不偏配色 <span>Unbiased Coloring</span></h1>

    /*
    <div class="formula">
      <span class="label">Constraint:</span>
      <i>2|&Delta; &minus; &#x25B2;| &le; |C|</i>
    </div>
    */
    
    <p class="desc">
      2色の配色に局所的な偏りが生じないよう、アルゴリズムによって数学的に設計されたパターン。
      /* 任意のサイクル <i>C</i> において色の出現比率の差を制限するこの制約は、平面グラフにおける「四色定理」と等価な関係にある。*/
    </p>
    
    <button id="colorBtn" onclick="nextColoring()">▶ 別の配色を生成</button>
  </div>
</div>

<script>
"use strict";

// ── シード付き乱数生成 (Mulberry32) ─────────────────────
function mulberry32(a) {
  return function() {
    var t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

// ── Canvas & Frame ───────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

// レイアウトに合わせて少しだけサイズ調整
const CW = 720, CH = 540; 
const FX = 40, FY = 40;
const FW = CW - FX * 2;   // 640
const FH = CH - FY * 2;   // 460
const BLEED    = 80;
const MIN_DIST = 55;
const FRAME_W  = 6;
const INNER_W  = 1.4;

canvas.style.width  = CW + 'px';
canvas.style.height = CH + 'px';
canvas.width  = Math.round(CW * DPR);
canvas.height = Math.round(CH * DPR);
ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

// ── Colors ───────────────────────────────────────────────
const COL_A = '#FF7F50';  // coral
const COL_B = '#43DFD0';  // teal

// Parse hex to rgb
function hexRGB(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
const [rA,gA,bA] = hexRGB(COL_A);
const [rB,gB,bB] = hexRGB(COL_B);

// ── State ────────────────────────────────────────────────
let mesh      = null;
let faceLabel = null;
let colored   = false;

// ── Poisson Disk (Bridson) ───────────────────────────────
function poissonDisk(x0,y0,w,h,r,k=30){
  const cell=r/Math.SQRT2, gw=Math.ceil(w/cell), gh=Math.ceil(h/cell);
  const grid=new Int32Array(gw*gh).fill(-1), pts=[], active=[];
  function ins(x,y){
    const i=pts.length; pts.push([x,y]); active.push(i);
    const gx=((x-x0)/cell)|0, gy=((y-y0)/cell)|0;
    if(gx>=0&&gx<gw&&gy>=0&&gy<gh) grid[gx+gy*gw]=i;
  }
  ins(x0+w*.5+(Math.random()-.5)*r, y0+h*.5+(Math.random()-.5)*r);
  while(active.length){
    const ri=(Math.random()*active.length)|0;
    const [ax,ay]=pts[active[ri]]; let placed=false;
    for(let n=0;n<k;n++){
      const a=Math.random()*6.2832, d=r*(1+Math.random());
      const x=ax+d*Math.cos(a), y=ay+d*Math.sin(a);
      if(x<x0||x>x0+w||y<y0||y>y0+h) continue;
      const cgx=((x-x0)/cell)|0, cgy=((y-y0)/cell)|0; let ok=true;
      outer:for(let dy=-2;dy<=2;dy++) for(let dx=-2;dx<=2;dx++){
        const gx=cgx+dx,gy=cgy+dy;
        if(gx<0||gx>=gw||gy<0||gy>=gh) continue;
        const pi=grid[gx+gy*gw]; if(pi<0) continue;
        const [px,py]=pts[pi];
        if((x-px)**2+(y-py)**2<r*r){ok=false;break outer;}
      }
      if(ok){ins(x,y);placed=true;}
    }
    if(!placed) active.splice(ri,1);
  }
  return pts;
}

// ── Delaunay (Bowyer-Watson) ─────────────────────────────
function delaunay(pts){
  const n=pts.length;
  let mnX=1e9,mnY=1e9,mxX=-1e9,mxY=-1e9;
  for(const[x,y]of pts){mnX=Math.min(mnX,x);mnY=Math.min(mnY,y);mxX=Math.max(mxX,x);mxY=Math.max(mxY,y);}
  const d=Math.max(mxX-mnX,mxY-mnY)*20, cx=(mnX+mxX)*.5, cy=(mnY+mxY)*.5;
  const sup=[[cx-d*2,cy-d],[cx,cy+d*2],[cx+d*2,cy-d]], all=[...pts,...sup];
  function cc(ax,ay,bx,by,cx2,cy2){
    const D=2*(ax*(by-cy2)+bx*(cy2-ay)+cx2*(ay-by));
    if(Math.abs(D)<1e-9)return null;
    const a2=ax*ax+ay*ay,b2=bx*bx+by*by,c2=cx2*cx2+cy2*cy2;
    const ux=(a2*(by-cy2)+b2*(cy2-ay)+c2*(ay-by))/D;
    const uy=(a2*(cx2-bx)+b2*(ax-cx2)+c2*(bx-ax))/D;
    return{ux,uy,r2:(ax-ux)**2+(ay-uy)**2};
  }
  const sc=cc(...sup[0],...sup[1],...sup[2]);
  let tris=sc?[[n,n+1,n+2,sc.ux,sc.uy,sc.r2]]:[];
  for(let i=0;i<n;i++){
    const[px,py]=all[i]; const bad=[],good=[];
    for(const t of tris)((px-t[3])**2+(py-t[4])**2<=t[5]+1e-7?bad:good).push(t);
    const bnd=[];
    for(const t of bad)for(let e=0;e<3;e++){
      const a=t[e],b=t[(e+1)%3]; let sh=false;
      for(const t2 of bad){if(t2===t)continue;
        for(let f=0;f<3;f++){const c=t2[f],dd=t2[(f+1)%3];
          if((a===c&&b===dd)||(a===dd&&b===c)){sh=true;break;}}if(sh)break;}
      if(!sh)bnd.push([a,b]);
    }
    tris=good;
    for(const[a,b]of bnd){const c2=cc(...all[a],...all[b],...all[i]);if(c2)tris.push([a,b,i,c2.ux,c2.uy,c2.r2]);}
  }
  return tris.filter(t=>t[0]<n&&t[1]<n&&t[2]<n).map(t=>[t[0],t[1],t[2]]);
}

// ── DSATUR 4-coloring ────────────────────────────────────
function dsatur(n, adj){
  const deadline=performance.now()+2000;
  const colors=new Int32Array(n).fill(-1);
  const nbS=Array.from({length:n},()=>new Set());
  const deg=adj.map(a=>a.length);
  for(let s=0;s<n;s++){
    let best=-1,bs=-1,bd=-1;
    for(let v=0;v<n;v++){if(colors[v]>=0)continue;
      const ss=nbS[v].size,d=deg[v];
      if(ss>bs||(ss===bs&&d>bd)){best=v;bs=ss;bd=d;}}
    if(best<0) break;
    let c=0; while(nbS[best].has(c))c++;
    colors[best]=c; for(const u of adj[best])nbS[u].add(c);
  }
  if(colors.reduce((m,c)=>Math.max(m,c),0)<=3) return Array.from(colors);
  colors.fill(-1);
  const td=adj.map(a=>a.length),rm=new Uint8Array(n),ord=[];
  for(let p=0;p<n;p++){let b=-1,bd2=Infinity;
    for(let v=0;v<n;v++)if(!rm[v]&&td[v]<bd2){b=v;bd2=td[v];}
    ord.unshift(b);rm[b]=1;for(const u of adj[b])td[u]--;}
  function bt(i){
    if(performance.now()>deadline)throw'TIMEOUT';
    if(i===n)return true;
    const v=ord[i],used=new Set(adj[v].map(u=>colors[u]).filter(c=>c>=0));
    for(let c=0;c<4;c++){if(!used.has(c)){colors[v]=c;if(bt(i+1))return true;colors[v]=-1;}}
    return false;
  }
  bt(0);
  return Array.from(colors);
}

// Edge-color class from vertex colors
function gec(ca,cb){
  const lo=Math.min(ca,cb),hi=Math.max(ca,cb);
  if((lo===0&&hi===1)||(lo===2&&hi===3))return 0;
  if((lo===0&&hi===2)||(lo===1&&hi===3))return 1;
  return 2;
}

// Random permutation of {0,1,2,3}
function randPerm4(){
  const p=[0,1,2,3];
  for(let i=3;i>0;i--){const j=(Math.random()*(i+1))|0;[p[i],p[j]]=[p[j],p[i]];}
  return p;
}

// ── Compute face labeling ────────────────────────────────
function computeFaceLabel(){
  const{pts,allTris,T,outerIdx,edgeMap,adj}=mesh;
  const nPts=pts.length;

  let raw=null;
  for(let attempt=0;attempt<10;attempt++){
    try{raw=dsatur(nPts,adj);if(raw&&raw.reduce((m,c)=>Math.max(m,c),0)<=3)break;}
    catch(e){raw=null;}
  }
  if(!raw)return false;

  const perm=randPerm4();
  const colors=raw.map(c=>c>=0?perm[c]:-1);

  const nb01=Array.from({length:T},()=>[-1,-1]);
  for(const{u,v,tris:tl}of edgeMap.values()){
    if(tl.length!==2||colors[u]<0||colors[v]<0)continue;
    const ec=gec(colors[u],colors[v]);
    if(ec===0||ec===1){nb01[tl[0]][ec]=tl[1];nb01[tl[1]][ec]=tl[0];}
  }

  const fl=new Int8Array(T).fill(-1);
  for(let start=0;start<T;start++){
    if(fl[start]>=0)continue;
    fl[start]=0; let cur=start,et=0;
    for(let step=0;step<T*2;step++){
      const next=nb01[cur][et];
      if(next<0||next===start||fl[next]>=0)break;
      fl[next]=1-fl[cur]; cur=next; et=1-et;
    }
  }
  for(let i=0;i<T;i++)if(fl[i]<0)fl[i]=0;
  faceLabel=fl;
  return true;
}

// ── Stained glass render ─────────────────────────────────
function drawGlassTriangle(t_idx, ax,ay,bx,by,cx2,cy2, r,g,b, brightness){
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(cx2,cy2); ctx.closePath();
  ctx.clip();

  const safeBright = 0.95 + (brightness - 1.0) * 0.5; 
  const rc=Math.min(255,Math.round(r*safeBright))|0;
  const gc=Math.min(255,Math.round(g*safeBright))|0;
  const bc=Math.min(255,Math.round(b*safeBright))|0;
  ctx.fillStyle=`rgb(${rc},${gc},${bc})`;
  ctx.fill();

  const cenX=(ax+bx+cx2)/3, cenY=(ay+by+cy2)/3;
  const rad=Math.max(Math.hypot(ax-cenX,ay-cenY),
                     Math.hypot(bx-cenX,by-cenY),
                     Math.hypot(cx2-cenX,cy2-cenY))*0.85;
  const grd=ctx.createRadialGradient(cenX,cenY,0,cenX,cenY,rad);
  grd.addColorStop(0,   'rgba(255,255,255,0.3)');
  grd.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  grd.addColorStop(1,   'rgba(0,0,0,0.03)');
  ctx.fillStyle=grd;
  ctx.fill();

  const rng = mulberry32(t_idx * 12345 + 6789);
  ctx.save();
  ctx.globalAlpha = 0.06;

  for(let i=0; i<4; i++){
    const px = cenX + (rng()-0.5)*rad;
    ctx.beginPath();
    ctx.moveTo(px-rad*0.2, cenY-rad);
    ctx.quadraticCurveTo(px+10*rng(), cenY, px, cenY+rad);
    ctx.strokeStyle='white';
    ctx.lineWidth = 0.7 + rng();
    ctx.stroke();
  }

  for(let i=0; i<8; i++){
    const bx_p = cenX + (rng()-0.5)*rad;
    const by_p = cenY + (rng()-0.5)*rad;
    const rr = 0.8 + rng()*2.3;
    ctx.beginPath();
    ctx.arc(bx_p, by_p, rr, 0, 6.28);
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.fill();
  }

  ctx.restore();
  ctx.restore();
}

// ── Main render ──────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,CW,CH);

  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,CW,CH);

  ctx.save();
  ctx.beginPath(); ctx.rect(FX,FY,FW,FH); ctx.clip();

  ctx.fillStyle='#ffffff';
  ctx.fillRect(FX,FY,FW,FH);

  if(mesh){
    const{pts,allTris,T,outerIdx,edgeMap,triVar}=mesh;

    if(colored && faceLabel){
      for(let t=0;t<T;t++){
        const[a,b,c]=allTris[t];
        if(a===outerIdx||b===outerIdx||c===outerIdx)continue;
        const fl=faceLabel[t];
        const[r,g,bb]=fl===0?[rA,gA,bA]:[rB,gB,bB];
        const{bright,posFactor}=triVar[t];
        drawGlassTriangle(
          t,
          pts[a][0],pts[a][1],pts[b][0],pts[b][1],pts[c][0],pts[c][1],
          r,g,bb, bright*posFactor
        );
      }
    }

    ctx.lineCap='round';
    ctx.lineJoin='round';

    for(const {u,v} of edgeMap.values()){
      if(u===outerIdx||v===outerIdx) continue;

      const edgeKey = u * 65536 + v;
      const rng = mulberry32(edgeKey);

      const width = INNER_W * (0.88 + rng() * 0.24);
      const gray = Math.round(12 + rng() * 18);

      ctx.strokeStyle = `rgb(${gray},${gray},${gray})`;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(pts[u][0] + (rng() - 0.5) * 0.4, pts[u][1] + (rng() - 0.5) * 0.4);
      ctx.lineTo(pts[v][0] + (rng() - 0.5) * 0.4, pts[v][1] + (rng() - 0.5) * 0.4);
      ctx.stroke();
    }
  }
  ctx.restore();

  ctx.strokeStyle='#18130E';
  ctx.lineWidth=FRAME_W;
  ctx.strokeRect(FX,FY,FW,FH);
}

// ── Build mesh ───────────────────────────────────────────
function buildMesh(){
  const raw=poissonDisk(FX-BLEED,FY-BLEED,FW+BLEED*2,FH+BLEED*2,MIN_DIST);
  const pts=raw;
  const innerTris=delaunay(pts);
  if(innerTris.length<4)return null;

  const edgeCnt=new Map();
  for(const[a,b,c]of innerTris)for(const[u,v]of[[a,b],[b,c],[a,c]]){
    const lo=Math.min(u,v),hi=Math.max(u,v),key=lo*65536+hi;
    if(!edgeCnt.has(key))edgeCnt.set(key,{u,v,cnt:0});
    edgeCnt.get(key).cnt++;
  }
  const boundaryEdges=[...edgeCnt.values()].filter(e=>e.cnt===1);
  const outerIdx=pts.length;
  pts.push([FX+FW*.5, FY-Math.max(FW,FH)*12]);

  const allTris=[...innerTris,...boundaryEdges.map(({u,v})=>[u,v,outerIdx])];
  const T=allTris.length, nPts=pts.length;

  const adjSet=Array.from({length:nPts},()=>new Set());
  for(const[a,b,c]of allTris){
    adjSet[a].add(b);adjSet[b].add(a);
    adjSet[a].add(c);adjSet[c].add(a);
    adjSet[b].add(c);adjSet[c].add(b);
  }
  const adj=adjSet.map(s=>[...s]);

  const edgeMap=new Map();
  for(let t=0;t<T;t++){
    const[a,b,c]=allTris[t];
    for(const[u,v]of[[a,b],[b,c],[a,c]]){
      const lo=Math.min(u,v),hi=Math.max(u,v),key=lo*65536+hi;
      if(!edgeMap.has(key))edgeMap.set(key,{u,v,tris:[]});
      edgeMap.get(key).tris.push(t);
    }
  }

  const triVar=allTris.map(([a,b,c])=>{
    const cx=(pts[a][0]+pts[b][0]+pts[c][0])/3;
    const cy=(pts[a][1]+pts[b][1]+pts[c][1])/3;
    const distFromLight=Math.hypot(cx-(FX+FW*0.5), cy-FY) / Math.hypot(FW,FH);
    const posFactor=1.08 - distFromLight*0.22;
    const bright=0.88 + Math.random()*0.24;
    return{bright,posFactor};
  });

  return{pts,allTris,T,outerIdx,adj,edgeMap,triVar};
}

// ── Actions ──────────────────────────────────────────────
let busy=false;

function nextColoring(){
  if(busy)return;
  busy=true;
  document.getElementById('colorBtn').disabled=true;
  setTimeout(()=>{
    colored=true;
    computeFaceLabel();
    render();
    document.getElementById('colorBtn').disabled=false;
    busy=false;
  },10);
}

// ── Init ─────────────────────────────────────────────────
(function init(){
  for(let i=0;i<30;i++){mesh=buildMesh();if(mesh)break;}
  render();
  nextColoring();
})();
</script>
</body>
</html>
